name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install root dependencies
        run: npm install

      - name: Install app dependencies
        working-directory: ./app
        run: npm install

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      - name: Lint (Root)
        run: npm run lint

      - name: Lint (App)
        working-directory: ./app
        run: npm run lint

      - name: TypeScript check (App)
        working-directory: ./app
        run: npx tsc --noEmit

      - name: TypeScript check (Backend)
        working-directory: ./backend
        run: npx tsc --noEmit

  build-app:
    runs-on: ubuntu-latest
    needs: lint
    env:
      NEXT_PUBLIC_SOLANA_RPC_URL: https://api.devnet.solana.com
      NEXT_PUBLIC_TREASURY_WALLET: 5hA4DvFa82zJS6yx5ahdb2HEKvmMx4zJeXTyZaWTA5A8
      NEXT_PUBLIC_FIREBASE_API_KEY: placeholder
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: placeholder.firebaseapp.com
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: demo-nexus
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: placeholder.appspot.com
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
      NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:000000000000000000000000"
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install app dependencies
        working-directory: ./app
        run: npm install

      - name: Build Next.js App
        working-directory: ./app
        run: npm run build
