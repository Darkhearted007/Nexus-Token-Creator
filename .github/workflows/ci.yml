name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install root dependencies
        run: npm install

      - name: Install app dependencies
        working-directory: ./app
        run: npm install

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      - name: Lint (Root)
        run: npm run lint

      - name: Lint (App)
        working-directory: ./app
        run: npm run lint

  build-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install app dependencies
        working-directory: ./app
        run: npm install

      - name: Build Next.js App
        working-directory: ./app
        run: npm run build
